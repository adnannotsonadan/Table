<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="https://github.com/" target="_blank">
         <label for="">
            Name : <br>
            <input type="text">
        </label> <br> <br>

        <label for="">
            Admission Number : <br>
            <input type="text">
        </label> <br> <br>

        <label for="">
            DOB: <br> 
            <input type="date">
        </label> <br> <br>

        <label for="">
            Batch : <br>
            <select name="" id="">
                <option value="">2026</option>
                <option value="">2027</option>
            </select>
        </label><br><br>

        <input type="checkbox" name="sec">
        <label for="sec">No active backlogs</label> <br> <br>

        <label for="">
            Gender :<br>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>
            
            <input type="radio" name="gender" id="fml">
            <label for="fml">Female</label>
        </label> <br> <br>

        <label for="">
            College <br>
            <select name="" id="">
                <option value="">GU</option>
                <option value="">GCET</option>
            </select>

        </label> <br> <br>

        <label for="">
            Feedback <br>
            <textarea name="" id="" placeholder="Enter your feedback"></textarea>
        </label><br><br>

        <button type="submit">Submit</button> 
    </form>
</body>
</html>
